services:
  api:
    build:
      context: ./apps/api
    env_file:
      - ./env/api.common.env
      - ./env/api.dev.env
      - ./env/minio.env
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: emails
      MINIO_REGION: us-east-1
    volumes:
      - ./apps/api:/app
      - api_data:/data
      - ${DATA_MOVEMENT_HOST_PATH:-./data/data_movement}:/data/data_movement
      - api_static:/app/staticfiles
      - ${L3_SPIDER_DATA_HOST_PATH:-./data/l3_spider/daily_anomaly}:/data/l3_spider/daily_anomaly:ro
    ports:
      - "8000:8000"
    entrypoint:
      - /bin/sh
      - -c
      - |
          set -e
          python manage.py migrate --noinput
          python manage.py seed_dummy_emails || true
          python manage.py runserver 0.0.0.0:8000
    networks:
      shared-net:
        aliases:
          - api

volumes:
  api_data:
  api_static:

networks:
  shared-net:
    external: true
    name: shared-net
