services:
  api:
    # 개발 DB schema 확인용으로 api entrypoint만 덮어쓴다.
    entrypoint: >
      /bin/sh -c "
        echo '>>> Running makemigrations & migrate...';
        python manage.py makemigrations api;
        python manage.py migrate;
        echo '>>> Migration completed successfully.';
        tail -f /dev/null
      "
