include:
  - docker-compose.dev.infra.yml

services:
  api:
    extends:
      file: docker-compose.dev.backend.yml
      service: api
    depends_on:
      adfs:
        condition: service_started
      airflow-postgres:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: ./apps/web
    env_file:
      - ./env/web.dev.env
    depends_on:
      - api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    networks:
      shared-net:
        aliases:
          - web

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
      airflow-webserver:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - api_static:/var/www/static:ro
    networks:
      - shared-net

volumes:
  api_data:
  api_static:
  web_node_modules:
