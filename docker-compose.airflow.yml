services:
  api:
    depends_on:
      airflow-postgres:
        condition: service_healthy

  airflow-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ${POSTGRES_DATA_HOST_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    ports:
      - "${AIRFLOW_POSTGRES_PORT:-5432}:5432"
    restart: always
    networks:
      shared-net:
        aliases:
          - airflow-postgres

  airflow-init:
    image: airflow-with-codeserver:2.11.0
    build:
      context: ./airflow
      dockerfile: Dockerfile
    env_file:
      - ./airflow/.env
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "$${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost/airflow}
      AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX: /airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-airflow-webserver-secret-key}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_TRIGGER_TOKEN: ${AIRFLOW_TRIGGER_TOKEN:-5ca99f0ae7b1fcd3f958ebb1c2ee4639d0a8fada21e8ff009d27f42cd2bbf31e}
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - ./airflow:/sources
    depends_on:
      airflow-postgres:
        condition: service_healthy
    networks:
      - shared-net

  airflow-webserver:
    image: airflow-with-codeserver:2.11.0
    build:
      context: ./airflow
      dockerfile: Dockerfile
    env_file:
      - ./airflow/.env
    command: webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost/airflow}
      AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX: /airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-airflow-webserver-secret-key}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_TRIGGER_TOKEN: ${AIRFLOW_TRIGGER_TOKEN:-5ca99f0ae7b1fcd3f958ebb1c2ee4639d0a8fada21e8ff009d27f42cd2bbf31e}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_user_site:/home/airflow/.local
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/airflow/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      shared-net:
        aliases:
          - airflow-webserver

  airflow-scheduler:
    image: airflow-with-codeserver:2.11.0
    build:
      context: ./airflow
      dockerfile: Dockerfile
    env_file:
      - ./airflow/.env
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost/airflow}
      AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX: /airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-airflow-webserver-secret-key}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_TRIGGER_TOKEN: ${AIRFLOW_TRIGGER_TOKEN:-5ca99f0ae7b1fcd3f958ebb1c2ee4639d0a8fada21e8ff009d27f42cd2bbf31e}
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_user_site:/home/airflow/.local
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: always
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - shared-net

  airflow-code:
    image: airflow-with-codeserver:2.11.0
    build:
      context: ./airflow
      dockerfile: Dockerfile
    env_file:
      - ./airflow/.env
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        mkdir -p
        /home/airflow/.config/code-server
        /home/airflow/.local/share/code-server
        /home/airflow/.local/share/code-server/extensions
        /home/airflow/.vscode
        && chown -R "$${AIRFLOW_UID:-50000}:0" /home/airflow
        && chmod 700 /home/airflow/.config /home/airflow/.config/code-server
        && exec code-server /opt/airflow
        --bind-addr 0.0.0.0:8081
        --auth password
        --disable-telemetry
        --user-data-dir /home/airflow/.local/share/code-server
        --extensions-dir /home/airflow/.local/share/code-server/extensions
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_WEBSERVER_BASE_URL:-http://localhost/airflow}
      AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX: /airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-dev-airflow-webserver-secret-key}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW_TRIGGER_TOKEN: ${AIRFLOW_TRIGGER_TOKEN:-5ca99f0ae7b1fcd3f958ebb1c2ee4639d0a8fada21e8ff009d27f42cd2bbf31e}
      HOME: /home/airflow
      XDG_CONFIG_HOME: /home/airflow/.config
      XDG_DATA_HOME: /home/airflow/.local/share
      PASSWORD: ${CODE_SERVER_PASSWORD:-airflow}
    working_dir: /opt/airflow
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_user_site:/home/airflow/.local
    ports:
      - "${AIRFLOW_CODE_SERVER_PORT:-8081}:8081"
    restart: always
    depends_on:
      airflow-webserver:
        condition: service_started
    networks:
      - shared-net

  nginx:
    depends_on:
      - web
      - api
      - airflow-webserver

volumes:
  airflow_user_site:

networks:
  shared-net:
    external: true
    name: shared-net
